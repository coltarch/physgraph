<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysGraph — Science Lab Graph Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0f1419;
    --surface2:  #161d26;
    --border:    #1e2936;
    --border2:   #2a3a4a;
    --text:      #d4dfe8;
    --muted:     #5a7080;
    --accent:    #00d4ff;
    --accent2:   #0099cc;
    --green:     #00e5a0;
    --orange:    #ff8c42;
    --pink:      #ff5f87;
    --purple:    #b088ff;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    position: relative;
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo-line {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #fff;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  h1 span { color: var(--accent); }

  .tagline {
    margin-top: 0.75rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  /* ── Main layout ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── Section headers ── */
  .section-head {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .section-head::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .section-head::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border2); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 1.25rem;
    background: var(--bg);
    padding: 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    width: fit-content;
  }

  .tab-btn {
    padding: 0.45rem 1rem;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--accent);
    box-shadow: 0 0 0 1px var(--border2);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Graph config row ── */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="text"], input[type="number"], select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.5rem 0.75rem;
    width: 100%;
    transition: border-color 0.18s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }

  /* ── Data table ── */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr { background: var(--surface2); }

  th {
    padding: 0.65rem 0.75rem;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.1rem 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }

  td input {
    background: transparent;
    border: none;
    border-radius: 4px;
    color: var(--text);
    font-size: 0.82rem;
    padding: 0.45rem 0.35rem;
    width: 100%;
    outline: none;
    transition: background 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  td input:focus { background: var(--surface2); }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: var(--pink); background: rgba(255,95,135,0.08); }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .btn {
    padding: 0.55rem 1.1rem;
    border-radius: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }

  .btn-ghost {
    background: transparent;
    border-color: var(--border2);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    box-shadow: 0 0 20px rgba(0,212,255,0.25);
  }
  .btn-primary:hover {
    background: #33ddff;
    box-shadow: 0 0 30px rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  .btn-dl {
    background: transparent;
    border-color: var(--border2);
    color: var(--muted);
    font-size: 0.72rem;
  }
  .btn-dl:hover { border-color: var(--green); color: var(--green); }

  /* ── CSV textarea ── */
  textarea {
    resize: vertical;
    min-height: 120px;
    font-size: 0.78rem;
    line-height: 1.6;
  }

  /* ── Output section ── */
  #output-section {
    display: none;
  }

  .output-grid {
    display: grid;
    grid-template-columns: 3fr 2fr;
    gap: 1.25rem;
    align-items: start;
  }

  @media (max-width: 720px) {
    .output-grid { grid-template-columns: 1fr; }
    .config-grid { grid-template-columns: 1fr; }
  }

  .graph-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s, transform 0.4s, border-color 0.2s;
  }
  .graph-card.show { opacity: 1; transform: none; }
  .graph-card:hover { border-color: var(--border2); }

  .graph-card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .graph-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
    margin-top: 0.25rem;
  }

  .graph-card-sub {
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .chart-wrap {
    position: relative;
    height: 280px;
  }

  /* ── Stats card ── */
  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s 0.1s, transform 0.4s 0.1s;
  }
  .stats-card.show { opacity: 1; transform: none; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 500; }

  .quality-badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 0.75rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .error-msg {
    background: rgba(255,95,135,0.08);
    border: 1px solid rgba(255,95,135,0.25);
    color: var(--pink);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    font-size: 0.75rem;
    margin-top: 0.75rem;
    display: none;
  }

  /* ── Color picker ── */
  .color-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 0.25rem;
  }
  .color-chip {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    outline: none;
  }
  .color-chip:hover { transform: scale(1.2); }
  .color-chip.selected { border-color: #fff; transform: scale(1.15); }
</style>
</head>
<body>

<header>
  <div class="logo-line">Science Lab Tool</div>
  <h1>Phys<span>Graph</span></h1>
  <p class="tagline">Enter your lab data &rarr; generate scatter plots with trend lines &rarr; download as PNG</p>
</header>

<main>

  <!-- Step 1 -->
  <div class="section-head">01 &mdash; Configure Your Graph</div>
  <div class="card">
    <div class="config-grid">
      <div class="field-group">
        <label>Graph Title</label>
        <input type="text" id="graphTitle" placeholder="e.g. Graph A1 · Height vs Eg">
      </div>
      <div class="field-group">
        <label>Subtitle</label>
        <input type="text" id="graphSub" placeholder="e.g. mass = 0.031 kg, distance = 2.29 m">
      </div>
      <div class="field-group">
        <label>X-Axis Label</label>
        <input type="text" id="xLabel" placeholder="e.g. Height (m)">
      </div>
      <div class="field-group">
        <label>Y-Axis Label</label>
        <input type="text" id="yLabel" placeholder="e.g. Eg — Gravitational Potential Energy (J)">
      </div>
    </div>
    <div class="field-group">
      <label>Accent Colour</label>
      <div class="color-row" id="colorPicker">
        <div class="color-chip selected" data-color="#00d4ff" style="background:#00d4ff" tabindex="0"></div>
        <div class="color-chip" data-color="#00e5a0" style="background:#00e5a0" tabindex="0"></div>
        <div class="color-chip" data-color="#ff8c42" style="background:#ff8c42" tabindex="0"></div>
        <div class="color-chip" data-color="#ff5f87" style="background:#ff5f87" tabindex="0"></div>
        <div class="color-chip" data-color="#b088ff" style="background:#b088ff" tabindex="0"></div>
        <div class="color-chip" data-color="#ffd166" style="background:#ffd166" tabindex="0"></div>
        <div class="color-chip" data-color="#f78166" style="background:#f78166" tabindex="0"></div>
      </div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="section-head">02 &mdash; Enter Your Data</div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="table">Manual Table</button>
      <button class="tab-btn" data-tab="csv">Paste CSV</button>
    </div>

    <div class="tab-panel active" id="tab-table">
      <div class="table-wrap">
        <table id="dataTable">
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th>X value</th>
              <th>Y value</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="addRow()">+ Add Row</button>
        <button class="btn btn-ghost" onclick="clearTable()">Clear All</button>
      </div>
    </div>

    <div class="tab-panel" id="tab-csv">
      <div class="field-group">
        <label>Paste CSV — one x,y pair per line, no header needed</label>
        <textarea id="csvInput" placeholder="0.433,0.146&#10;0.750,0.250&#10;1.130,0.364"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="loadCSV()">Load into Table &rarr;</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="btn-row" style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border)">
      <button class="btn btn-primary" onclick="generateGraph()">Generate Graph &rarr;</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div id="output-section">
    <div class="section-head">03 &mdash; Your Graph</div>
    <div class="output-grid">
      <div class="graph-card" id="outputCard">
        <div class="graph-card-accent" id="cardAccent"></div>
        <div class="graph-card-title" id="cardTitle">Graph</div>
        <div class="graph-card-sub" id="cardSub"></div>
        <div class="chart-wrap">
          <canvas id="outputChart"></canvas>
        </div>
        <div class="btn-row" style="margin-top:0.75rem">
          <button class="btn btn-dl" onclick="downloadGraph()">&#8595; Download PNG</button>
        </div>
      </div>

      <div class="stats-card" id="statsCard">
        <div style="font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem">Statistics</div>
        <div id="statsBox"></div>
      </div>
    </div>
  </div>

</main>

<script>
let selectedColor = '#00d4ff';
let activeChart = null;
let rowCount = 0;

// ── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  addRow(); addRow(); addRow(); addRow();

  document.querySelectorAll('.color-chip').forEach(chip => {
    chip.addEventListener('click', () => selectColor(chip));
    chip.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectColor(chip); });
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
});

function selectColor(chip) {
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  selectedColor = chip.dataset.color;
}

// ── Table ───────────────────────────────────────────────────────────────────
function addRow(x = '', y = '') {
  rowCount++;
  const id = rowCount;
  const tbody = document.getElementById('tableBody');
  const tr = document.createElement('tr');
  tr.id = `row-${id}`;
  tr.innerHTML = `
    <td style="color:var(--muted);font-size:0.7rem;padding-left:0.75rem;width:40px">${id}</td>
    <td><input type="number" step="any" placeholder="0.000" value="${x}" aria-label="X value row ${id}"></td>
    <td><input type="number" step="any" placeholder="0.000" value="${y}" aria-label="Y value row ${id}"></td>
    <td><button class="del-btn" onclick="deleteRow(${id})" aria-label="Delete row ${id}">&times;</button></td>
  `;
  tbody.appendChild(tr);
}

function deleteRow(id) {
  const row = document.getElementById(`row-${id}`);
  if (row) row.remove();
}

function clearTable() {
  document.getElementById('tableBody').innerHTML = '';
  rowCount = 0;
  addRow(); addRow(); addRow(); addRow();
}

function getTableData() {
  const rows = document.querySelectorAll('#tableBody tr');
  const points = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const x = parseFloat(inputs[0].value);
    const y = parseFloat(inputs[1].value);
    if (!isNaN(x) && !isNaN(y)) points.push({ x, y });
  });
  return points.sort((a, b) => a.x - b.x);
}

function loadCSV() {
  const raw = document.getElementById('csvInput').value.trim();
  if (!raw) return;
  document.getElementById('tableBody').innerHTML = '';
  rowCount = 0;
  const lines = raw.split('\n');
  lines.forEach(line => {
    const parts = line.split(',');
    if (parts.length >= 2) addRow(parts[0].trim(), parts[1].trim());
  });
  // Switch to table tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="table"]').classList.add('active');
  document.getElementById('tab-table').classList.add('active');
}

// ── Error ───────────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ── Linear regression ────────────────────────────────────────────────────────
function linReg(points) {
  const n = points.length;
  const sx  = points.reduce((s, p) => s + p.x, 0);
  const sy  = points.reduce((s, p) => s + p.y, 0);
  const sxy = points.reduce((s, p) => s + p.x * p.y, 0);
  const sxx = points.reduce((s, p) => s + p.x * p.x, 0);
  const slope = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  const intercept = (sy - slope * sx) / n;
  const yMean = sy / n;
  const ssTot = points.reduce((s, p) => s + (p.y - yMean) ** 2, 0);
  const ssRes = points.reduce((s, p) => s + (p.y - (slope * p.x + intercept)) ** 2, 0);
  const r2 = ssTot === 0 ? 1 : 1 - ssRes / ssTot;
  return { slope, intercept, r2 };
}

// ── Generate ─────────────────────────────────────────────────────────────────
function generateGraph() {
  const data = getTableData();
  if (data.length < 2) { showError('Need at least 2 valid data points.'); return; }

  const title = document.getElementById('graphTitle').value || 'Graph';
  const sub   = document.getElementById('graphSub').value || '';
  const xLbl  = document.getElementById('xLabel').value || 'X';
  const yLbl  = document.getElementById('yLabel').value || 'Y';
  const color = selectedColor;

  const { slope, intercept, r2 } = linReg(data);
  const xMin = data[0].x, xMax = data[data.length - 1].x;
  const pad = (xMax - xMin) * 0.15 || 0.05;
  const trendData = [
    { x: xMin - pad, y: slope * (xMin - pad) + intercept },
    { x: xMax + pad, y: slope * (xMax + pad) + intercept },
  ];

  // UI
  document.getElementById('cardTitle').textContent = title;
  document.getElementById('cardTitle').style.color = color;
  document.getElementById('cardSub').textContent = sub;
  document.getElementById('cardAccent').style.background =
    `linear-gradient(90deg, ${color}44, ${color})`;

  // Stats
  const sign = intercept >= 0 ? '+ ' : '− ';
  let quality, qColor;
  if (r2 > 0.95)      { quality = 'Strong linear fit'; qColor = '#00e5a0'; }
  else if (r2 > 0.80) { quality = 'Moderate linear fit'; qColor = '#ffd166'; }
  else                { quality = 'Weak linear fit — check outliers'; qColor = '#ff5f87'; }

  document.getElementById('statsBox').innerHTML = `
    <div class="stat-row"><span class="stat-label">Data Points</span><span class="stat-value" style="color:${color}">${data.length}</span></div>
    <div class="stat-row"><span class="stat-label">Slope (m)</span><span class="stat-value" style="color:${color}">${slope.toFixed(5)}</span></div>
    <div class="stat-row"><span class="stat-label">Y-intercept (b)</span><span class="stat-value" style="color:${color}">${intercept.toFixed(5)}</span></div>
    <div class="stat-row"><span class="stat-label">Equation</span><span class="stat-value" style="color:${color};font-size:0.7rem">y = ${slope.toFixed(4)}x ${sign}${Math.abs(intercept).toFixed(4)}</span></div>
    <div class="stat-row"><span class="stat-label">R²</span><span class="stat-value" style="color:${color}">${r2.toFixed(4)}</span></div>
    <div><span class="quality-badge" style="background:${qColor}22;color:${qColor};border:1px solid ${qColor}44">${quality}</span></div>
  `;

  // Chart
  if (activeChart) activeChart.destroy();

  Chart.defaults.color = '#5a7080';
  Chart.defaults.borderColor = '#1e2936';
  Chart.defaults.font.family = "'JetBrains Mono', monospace";
  Chart.defaults.font.size = 10;

  const ctx = document.getElementById('outputChart').getContext('2d');
  activeChart = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: 'Trend Line',
          data: trendData,
          type: 'line',
          borderColor: color + '50',
          borderWidth: 1.8,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
        },
        {
          label: 'Data Points',
          data,
          backgroundColor: color,
          borderColor: 'rgba(255,255,255,0.6)',
          borderWidth: 0.8,
          pointRadius: 7,
          pointHoverRadius: 9,
          order: 1,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0f1419',
          borderColor: '#1e2936',
          borderWidth: 1,
          titleColor: '#d4dfe8',
          bodyColor: '#5a7080',
          padding: 10,
          callbacks: {
            label: c => `(${c.parsed.x}, ${c.parsed.y})`,
          },
        },
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: xLbl, color: '#5a7080', font: { size: 10 }, padding: { top: 6 } },
          grid: { color: '#1e2936' },
          ticks: { maxTicksLimit: 7 },
        },
        y: {
          title: { display: true, text: yLbl, color: '#5a7080', font: { size: 10 }, padding: { bottom: 6 } },
          grid: { color: '#1e2936' },
          ticks: { maxTicksLimit: 7 },
        },
      },
    },
  });

  // Show output
  const sec = document.getElementById('output-section');
  sec.style.display = 'block';
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById('outputCard').classList.add('show');
      document.getElementById('statsCard').classList.add('show');
    }, 40);
  });
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Download — matplotlib-style rendered PNG ──────────────────────────────────
function downloadGraph() {
  if (!activeChart) return;

  const title  = document.getElementById('graphTitle').value || 'Graph';
  const sub    = document.getElementById('graphSub').value   || '';
  const xLbl   = document.getElementById('xLabel').value     || 'X';
  const yLbl   = document.getElementById('yLabel').value     || 'Y';
  const color  = selectedColor;
  const data   = getTableData();
  const slug   = title.replace(/[^a-z0-9]/gi, '_').toLowerCase().replace(/_+/g, '_');

  const { slope, intercept } = linReg(data);

  // ── Canvas setup ──────────────────────────────────────────────────────────
  const W = 1260, H = 780;
  const PAD = { top: 90, right: 60, bottom: 90, left: 100 };
  const PW = W - PAD.left - PAD.right;
  const PH = H - PAD.top  - PAD.bottom;

  const c   = document.createElement('canvas');
  c.width   = W; c.height = H;
  const cx  = c.getContext('2d');

  // ── Background ────────────────────────────────────────────────────────────
  cx.fillStyle = '#0d1117';
  cx.fillRect(0, 0, W, H);

  // ── Top accent gradient bar ───────────────────────────────────────────────
  const bar = cx.createLinearGradient(60, 0, W - 60, 0);
  bar.addColorStop(0, color + '33');
  bar.addColorStop(1, color);
  cx.fillStyle = bar;
  cx.fillRect(60, 14, W - 120, 7);

  // ── Title ─────────────────────────────────────────────────────────────────
  cx.fillStyle = '#e6edf3';
  cx.font = 'bold 22px "Courier New", monospace';
  cx.textAlign = 'center';
  cx.fillText(title, W / 2, 52);
  if (sub) {
    cx.fillStyle = '#5a7080';
    cx.font = '13px "Courier New", monospace';
    cx.fillText(sub, W / 2, 70);
  }

  // ── Plot area background ──────────────────────────────────────────────────
  cx.fillStyle = '#161b22';
  cx.fillRect(PAD.left, PAD.top, PW, PH);

  // ── Axis ranges ───────────────────────────────────────────────────────────
  const xs = data.map(p => p.x), ys = data.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const xPad = (xMax - xMin) * 0.15 || 0.1;
  const yPad = (yMax - yMin) * 0.18 || 0.05;
  const xLo = xMin - xPad, xHi = xMax + xPad;
  const yLo = Math.max(0, yMin - yPad), yHi = yMax + yPad;

  function toCanvasX(v) { return PAD.left + (v - xLo) / (xHi - xLo) * PW; }
  function toCanvasY(v) { return PAD.top  + PH - (v - yLo) / (yHi - yLo) * PH; }

  // ── Grid lines ────────────────────────────────────────────────────────────
  cx.strokeStyle = '#21262d';
  cx.lineWidth = 0.8;

  function niceSteps(lo, hi, n) {
    const raw = (hi - lo) / n;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    const nice = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
    const step = nice * mag;
    const start = Math.ceil(lo / step) * step;
    const vals = [];
    for (let v = start; v <= hi + step * 0.001; v += step) vals.push(+v.toPrecision(10));
    return vals;
  }

  const xTicks = niceSteps(xLo, xHi, 6);
  const yTicks = niceSteps(yLo, yHi, 6);

  xTicks.forEach(v => {
    const x = toCanvasX(v);
    cx.beginPath(); cx.moveTo(x, PAD.top); cx.lineTo(x, PAD.top + PH); cx.stroke();
  });
  yTicks.forEach(v => {
    const y = toCanvasY(v);
    cx.beginPath(); cx.moveTo(PAD.left, y); cx.lineTo(PAD.left + PW, y); cx.stroke();
  });

  // ── Axis border ───────────────────────────────────────────────────────────
  cx.strokeStyle = '#30363d';
  cx.lineWidth = 1.2;
  cx.strokeRect(PAD.left, PAD.top, PW, PH);

  // ── Tick labels ───────────────────────────────────────────────────────────
  cx.fillStyle = '#8b949e';
  cx.font = '13px "Courier New", monospace';
  cx.textAlign = 'center';
  xTicks.forEach(v => {
    cx.fillText(+v.toFixed(4).replace(/\.?0+$/, ''), toCanvasX(v), PAD.top + PH + 20);
  });
  cx.textAlign = 'right';
  yTicks.forEach(v => {
    cx.fillText(+v.toFixed(4).replace(/\.?0+$/, ''), PAD.left - 10, toCanvasY(v) + 4);
  });

  // ── Axis labels ───────────────────────────────────────────────────────────
  cx.fillStyle = '#8b949e';
  cx.font = '14px "Courier New", monospace';
  cx.textAlign = 'center';
  cx.fillText(xLbl, PAD.left + PW / 2, H - 18);

  cx.save();
  cx.translate(20, PAD.top + PH / 2);
  cx.rotate(-Math.PI / 2);
  cx.fillText(yLbl, 0, 0);
  cx.restore();

  // ── Trend line ────────────────────────────────────────────────────────────
  cx.strokeStyle = color + '60';
  cx.lineWidth = 2;
  cx.setLineDash([8, 5]);
  cx.beginPath();
  cx.moveTo(toCanvasX(xLo), toCanvasY(slope * xLo + intercept));
  cx.lineTo(toCanvasX(xHi), toCanvasY(slope * xHi + intercept));
  cx.stroke();
  cx.setLineDash([]);

  // ── Data points ───────────────────────────────────────────────────────────
  data.forEach(p => {
    const px = toCanvasX(p.x), py = toCanvasY(p.y);
    // Glow
    const grd = cx.createRadialGradient(px, py, 0, px, py, 14);
    grd.addColorStop(0, color + '55');
    grd.addColorStop(1, 'transparent');
    cx.fillStyle = grd;
    cx.beginPath(); cx.arc(px, py, 14, 0, Math.PI * 2); cx.fill();
    // Solid dot
    cx.fillStyle = color;
    cx.beginPath(); cx.arc(px, py, 7, 0, Math.PI * 2); cx.fill();
    // White ring
    cx.strokeStyle = 'rgba(255,255,255,0.55)';
    cx.lineWidth = 0.8;
    cx.beginPath(); cx.arc(px, py, 7, 0, Math.PI * 2); cx.stroke();
  });

  // ── Equation annotation ───────────────────────────────────────────────────
  const sign = intercept >= 0 ? '+ ' : '− ';
  const eqStr = `y = ${slope.toFixed(4)}x ${sign}${Math.abs(intercept).toFixed(4)}`;
  cx.font = '13px "Courier New", monospace';
  cx.textAlign = 'right';
  cx.fillStyle = color;
  cx.globalAlpha = 0.85;
  cx.fillText(eqStr, PAD.left + PW - 12, PAD.top + PH - 14);
  cx.globalAlpha = 1;

  // ── Save ──────────────────────────────────────────────────────────────────
  const link = document.createElement('a');
  link.download = `${slug}.png`;
  link.href = c.toDataURL('image/png');
  link.click();
}
</script>
